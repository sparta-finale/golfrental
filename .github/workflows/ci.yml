name: CI

on:
  pull_request:
    branches: [ dev ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: ${{secrets.SPRING_DATASOURCE_MYSQL_DB_NAME}}
          MYSQL_ROOT_PASSWORD: ${{secrets.SPRING_DATASOURCE_MYSQL_PASSWORD}}
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_MYSQL_URL: ${{secrets.SPRING_DATASOURCE_MYSQL_URL}}
      SPRING_DATASOURCE_MYSQL_USERNAME: ${{secrets.SPRING_DATASOURCE_MYSQL_USERNAME}}
      SPRING_DATASOURCE_MYSQL_PASSWORD: ${{secrets.SPRING_DATASOURCE_MYSQL_PASSWORD}}

      REDIS_HOST: localhost
      REDIS_PORT: 6379

      JWT_SECRET_KEY: ${{secrets.JWT_SECRET_KEY}}
      GEMINI_API_KEY: ${{secrets.GEMINI_API_KEY}}
      AWS_S3_BUCKET: ${{secrets.AWS_S3_BUCKET}}
      AWS_REGION: ${{secrets.AWS_REGION}}
      AWS_ACCESS_KEY: ${{secrets.AWS_ACCESS_KEY}}
      AWS_SECRET_KEY: ${{secrets.AWS_SECRET_KEY}}

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Compile and Build Application
        run: ./gradlew build -x test --no-daemon

      - name: Run Unit and Integration Tests
        run: ./gradlew clean test --no-daemon