name: CI

on:
  pull_request:
    branches: [ dev ]
  push:
    branches:
      - refactor/184-common

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: test_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for Gradlew
        run: chmod +x gradlew

      - name: Compile and Build Application
        run: ./gradlew build -x test --no-daemon

      - name: Run Unit and Integration Tests
        env:
          SPRING_DATASOURCE_MYSQL_DB_NAME: ${{secrets.SPRING_DATASOURCE_MYSQL_DB_NAME}}
          SPRING_DATASOURCE_MYSQL_USERNAME: ${{secrets.SPRING_DATASOURCE_MYSQL_USERNAME}}
          SPRING_DATASOURCE_MYSQL_PASSWORD: ${{secrets.SPRING_DATASOURCE_MYSQL_PASSWORD}}
          JWT_SECRET_KEY: ${{secrets.JWT_SECRET_KEY}}
        run: ./gradlew clean test --no-daemon