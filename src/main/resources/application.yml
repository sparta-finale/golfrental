spring:
  application:
    name: golf-rental-server
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  cloud:
    aws:
      s3:
        bucket: ${AWS_S3_BUCKET}
      region:
        static: ${AWS_REGION}

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-validity: 3600000
  refresh-token-validity: 604800000

gemini:
  api:
    key: ${GEMINI_API_KEY}
    model-name: gemini-2.0-flash
    temperature: 0.7
    max-tokens: 2048

langchain:
  chat:
    memory:
      max-messages: 10

rag:
  retriever:
    post:
      max-results: 5
      min-score: 0.6
    document:
      max-results: 3
      min-score: 0.7

logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    org.springframework.core.env: DEBUG
    org.springframework.boot.context.config: DEBUG
    com.zaxxer.hikari: DEBUG

toss:
  secret-key: ${TOSS_SECRET_KEY}
  base-url: https://api.tosspayments.com/v1/payments

# cors.allowed-origins는 환경별(application-*.yml)로 관리
cors:
  allowed-origins: ""